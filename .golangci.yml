version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - staticcheck
    - govet
    - ineffassign
    - revive
    - misspell
    - unused

  exclusions:
    paths:
      - third_party$
      - builtin$
      - examples$

    rules:
      - linters:
          - errcheck
        text: 'Error return value of `.*\.Close` is not checked'

      - linters:
          - errcheck
        text: 'Error return value of `fmt\.(Fprint|Fprintf)` is not checked'

      - linters:
          - staticcheck
        text: 'QF1012:'

      - linters:
          - staticcheck
        text: 'QF1003:'

      - linters:
          - staticcheck
        text: 'SA9003:'

  settings:
    errcheck:
      exclude-functions:
        - io.Close
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - net.Close

    revive:
      severity: warning

formatters:
  enable:
    - gofmt